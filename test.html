<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue 测试</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            color: white;
        }
        .feature-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px;
            margin: 16px;
            cursor: pointer;
            transition: transform 0.3s;
            color: #333;
        }
        .feature-card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <h1>🎨 Imagic - Vue 测试版</h1>
            <p>如果你看到这个页面，说明Vue可以正常工作</p>

            <div class="feature-card" @click="testApi">
                <h2>👔 一键换衣</h2>
                <p>点击测试API连接</p>
                <p v-if="apiStatus">状态: {{ apiStatus }}</p>
            </div>

            <div class="feature-card" @click="showConfig = !showConfig">
                <h2>⚙️ 配置</h2>
                <p>点击显示/隐藏配置</p>
            </div>

            <div v-if="showConfig" style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 12px; margin-top: 20px;">
                <h3>ComfyUI 配置</h3>
                <p>服务器: https://dzqgp58z0s-8188.cnb.run</p>
                <button @click="testConnection" style="padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
                    测试连接
                </button>
                <p v-if="connectionResult">{{ connectionResult }}</p>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    showConfig: false,
                    apiStatus: '',
                    connectionResult: ''
                }
            },
            methods: {
                testApi() {
                    this.apiStatus = '测试API功能...'
                    setTimeout(() => {
                        this.apiStatus = '✅ Vue响应式正常工作!'
                    }, 1000)
                },
                async testConnection() {
                    this.connectionResult = '测试中...'
                    try {
                        const response = await fetch('https://dzqgp58z0s-8188.cnb.run/api/system_stats')
                        if (response.ok) {
                            this.connectionResult = '✅ ComfyUI连接成功!'
                        } else {
                            this.connectionResult = '❌ 连接失败: ' + response.status
                        }
                    } catch (error) {
                        this.connectionResult = '❌ 网络错误: ' + error.message
                    }
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
