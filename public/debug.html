<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue应用调试</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
            margin: 0;
        }
        .console {
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            max-height: 400px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.4;
        }
        .error { color: #ff4444; }
        .warning { color: #ffaa00; }
        .success { color: #44ff44; }
        .info { color: #4488ff; }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #555;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            border-left: 4px solid #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }
    </style>
</head>
<body>
    <h1>🔍 Vue应用调试工具</h1>
    
    <div class="status">
        <strong>当前状态:</strong> <span id="currentStatus">初始化中...</span>
    </div>
    
    <div>
        <button onclick="testMainApp()">测试主应用</button>
        <button onclick="testVueImport()">测试Vue导入</button>
        <button onclick="testRouterImport()">测试路由导入</button>
        <button onclick="clearConsole()">清除日志</button>
        <button onclick="openMainApp()">打开主应用</button>
    </div>
    
    <h2>📋 实时日志</h2>
    <div id="console" class="console"></div>
    
    <h2>🌐 网络请求监控</h2>
    <div id="networkLog" class="console"></div>

    <script>
        let logCount = 0;
        
        function log(message, type = 'info') {
            const console = document.getElementById('console');
            const time = new Date().toLocaleTimeString();
            const className = type;
            logCount++;
            
            const logEntry = document.createElement('div');
            logEntry.className = className;
            logEntry.innerHTML = `[${time}] #${logCount} ${message}`;
            console.appendChild(logEntry);
            console.scrollTop = console.scrollHeight;
            
            // 更新状态
            document.getElementById('currentStatus').textContent = message;
        }
        
        function networkLog(message, type = 'info') {
            const networkConsole = document.getElementById('networkLog');
            const time = new Date().toLocaleTimeString();
            const className = type;
            
            const logEntry = document.createElement('div');
            logEntry.className = className;
            logEntry.innerHTML = `[${time}] ${message}`;
            networkConsole.appendChild(logEntry);
            networkConsole.scrollTop = networkConsole.scrollHeight;
        }
        
        function clearConsole() {
            document.getElementById('console').innerHTML = '';
            document.getElementById('networkLog').innerHTML = '';
            logCount = 0;
        }
        
        // 监控所有网络请求
        const originalFetch = window.fetch;
        window.fetch = function(...args) {
            const url = args[0];
            networkLog(`🌐 发起请求: ${url}`, 'info');
            
            return originalFetch.apply(this, args)
                .then(response => {
                    networkLog(`✅ 请求成功: ${url} (${response.status})`, 'success');
                    return response;
                })
                .catch(error => {
                    networkLog(`❌ 请求失败: ${url} - ${error.message}`, 'error');
                    throw error;
                });
        };
        
        // 监控所有错误
        window.addEventListener('error', function(event) {
            log(`❌ JavaScript错误: ${event.error.message}`, 'error');
            log(`📍 错误位置: ${event.filename}:${event.lineno}:${event.colno}`, 'error');
            if (event.error.stack) {
                log(`📚 错误堆栈: ${event.error.stack}`, 'error');
            }
        });
        
        window.addEventListener('unhandledrejection', function(event) {
            log(`❌ 未处理的Promise拒绝: ${event.reason}`, 'error');
        });
        
        // 测试主应用
        async function testMainApp() {
            log('🧪 开始测试主应用...', 'info');
            
            try {
                // 创建隐藏的iframe来测试主应用
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = '/';
                
                const promise = new Promise((resolve, reject) => {
                    iframe.onload = () => {
                        try {
                            log('✅ 主应用iframe加载成功', 'success');
                            
                            // 检查iframe内容
                            setTimeout(() => {
                                try {
                                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                                    const appElement = iframeDoc.getElementById('app');
                                    
                                    if (appElement) {
                                        if (appElement.innerHTML.trim()) {
                                            log('✅ #app元素有内容', 'success');
                                            log(`📄 内容预览: ${appElement.innerHTML.substring(0, 200)}...`, 'info');
                                        } else {
                                            log('⚠️ #app元素为空', 'warning');
                                        }
                                    } else {
                                        log('❌ 找不到#app元素', 'error');
                                    }
                                    
                                    resolve();
                                } catch (error) {
                                    log(`❌ 检查iframe内容失败: ${error.message}`, 'error');
                                    resolve();
                                }
                            }, 3000);
                            
                        } catch (error) {
                            log(`❌ iframe加载处理失败: ${error.message}`, 'error');
                            reject(error);
                        }
                    };
                    
                    iframe.onerror = () => {
                        log('❌ 主应用iframe加载失败', 'error');
                        reject(new Error('iframe加载失败'));
                    };
                    
                    setTimeout(() => {
                        log('⏰ iframe加载超时', 'warning');
                        reject(new Error('加载超时'));
                    }, 10000);
                });
                
                document.body.appendChild(iframe);
                
                await promise;
                
                document.body.removeChild(iframe);
                log('🧹 清理iframe完成', 'info');
                
            } catch (error) {
                log(`❌ 主应用测试失败: ${error.message}`, 'error');
            }
        }
        
        // 测试Vue导入
        async function testVueImport() {
            log('🧪 测试Vue导入...', 'info');
            
            try {
                const vue = await import('vue');
                log('✅ Vue导入成功', 'success');
                log(`📦 Vue版本: ${vue.version || '未知'}`, 'info');
                
                if (vue.createApp) {
                    log('✅ createApp函数可用', 'success');
                } else {
                    log('❌ createApp函数不可用', 'error');
                }
                
            } catch (error) {
                log(`❌ Vue导入失败: ${error.message}`, 'error');
            }
        }
        
        // 测试路由导入
        async function testRouterImport() {
            log('🧪 测试Vue Router导入...', 'info');
            
            try {
                const router = await import('vue-router');
                log('✅ Vue Router导入成功', 'success');
                
                if (router.createRouter) {
                    log('✅ createRouter函数可用', 'success');
                } else {
                    log('❌ createRouter函数不可用', 'error');
                }
                
            } catch (error) {
                log(`❌ Vue Router导入失败: ${error.message}`, 'error');
            }
        }
        
        // 打开主应用
        function openMainApp() {
            log('🚀 打开主应用...', 'info');
            window.open('/', '_blank');
        }
        
        // 页面加载完成
        window.onload = function() {
            log('🚀 调试工具加载完成', 'success');
            log('💡 点击按钮开始测试各个组件', 'info');
            
            // 自动测试基础功能
            setTimeout(() => {
                log('🔄 自动开始基础测试...', 'info');
                testVueImport();
            }, 1000);
            
            setTimeout(() => {
                testRouterImport();
            }, 2000);
        };
    </script>
</body>
</html>
